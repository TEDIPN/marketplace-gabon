<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produits recherchés</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background:
                radial-gradient(circle at top, rgba(37, 99, 235, 0.10), transparent 25%),
                linear-gradient(to bottom, #0b0b0f, #111117 45%, #0a0a0d);
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .page-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .top-left-menu {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 2000;
        }

        .menu-btn {
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            width: 46px;
            height: 46px;
            border-radius: 14px;
            font-size: 22px;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }

        .about-menu {
            display: none;
            position: absolute;
            top: 56px;
            left: 0;
            width: 230px;
            background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 18px;
            padding: 14px;
            box-shadow: 0 14px 30px rgba(0,0,0,0.45);
        }

        .about-menu h3 {
            margin: 0 0 10px 0;
            font-size: 15px;
            color: #f3f4f6;
        }

        .about-menu a {
            width: 100%;
            display: block;
            text-align: left;
            background: rgba(255,255,255,0.04);
            color: white;
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .about-menu a:hover {
            background: rgba(255,255,255,0.10);
        }

        .hero {
            background: linear-gradient(145deg, rgba(30,30,30,0.95), rgba(20,20,20,0.95));
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 22px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.35);
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0 0 18px 0;
            text-align: center;
            font-size: 42px;
            line-height: 1.1;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        #compteurDemandes {
            text-align: center;
            color: #b3b3b3;
            font-size: 17px;
            margin: 0 0 14px 0;
        }

        .main-cta {
            margin-bottom: 14px;
        }

        .main-cta button {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #f97316, #ea580c);
            box-shadow: 0 10px 22px rgba(0,0,0,0.35);
            transition: 0.25s ease;
        }

        .main-cta button:hover {
            transform: translateY(-2px);
        }

        .secondary-actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }

        .secondary-actions button {
            width: 100%;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: 0.25s ease;
            box-shadow: 0 6px 16px rgba(0,0,0,0.25);
        }

        .secondary-actions button:hover {
            transform: translateY(-2px);
        }

        .utility-actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            align-items: start;
        }

        .filtres-row {
            display: flex;
            justify-content: flex-start;
        }

        button {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
        }

        .btn-tri {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            padding: 12px 16px;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 6px 16px rgba(0,0,0,0.25);
            font-weight: bold;
        }

        .btn-tri:hover {
            transform: translateY(-2px);
        }

        .filtres-zone {
            position: relative;
            display: inline-block;
        }

        .menu-filtres {
            display: none;
            position: absolute;
            top: 56px;
            left: 0;
            width: 260px;
            background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 14px 30px rgba(0,0,0,0.45);
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .menu-filtres button,
        .menu-filtres select {
            width: 100%;
            margin-bottom: 10px;
        }

        .menu-filtres select {
            background-color: #151515;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
        }

        #demandes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 22px;
            align-items: start;
        }

        .demande {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
            padding: 15px;
            border-radius: 20px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
            transition: 0.25s ease;
            overflow: hidden;
            min-height: 420px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .demande:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 30px rgba(0,0,0,0.45);
        }

        .demande img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 12px;
        }

        .demande h3 {
            margin: 6px 0 10px 0;
            word-break: break-word;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.2;
        }

        .demande p {
            margin-bottom: 10px;
            word-break: break-word;
            color: #e5e5e5;
            line-height: 1.45;
        }

        .demande p:last-of-type {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .prix {
            font-size: 20px;
            font-weight: bold;
            color: #22c55e !important;
            margin-bottom: 10px;
        }

        .actions {
            margin-top: auto;
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #1ebe5d);
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            transition: 0.25s ease;
        }

        .btn-whatsapp:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #1ebe5d, #17a74a);
        }

        .btn-appel {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.25s ease;
        }

        .btn-appel:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #d97706, #b45309);
        }

        .btn-delete {
            background: #ef4444;
            margin-top: 10px;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .badge-nouveau {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            align-self: flex-start;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            font-size: 13px;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 999px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
        }

        .empty-state {
            width: 100%;
            text-align: center;
            color: #aaa;
            font-size: 18px;
            margin-top: 20px;
            background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
            border-radius: 20px;
            padding: 28px 20px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        @media (max-width: 768px) {
            body {
                padding: 14px;
            }

            .hero {
                padding: 18px;
            }

            .hero h1 {
                font-size: 30px;
                margin-top: 18px;
            }

            #demandes {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
            }

            .demande {
                min-height: auto;
                padding: 10px;
                border-radius: 16px;
            }

            .demande img {
                height: 115px;
                border-radius: 12px;
                margin-bottom: 8px;
            }

            .demande h3 {
                font-size: 15px;
                margin: 4px 0 6px 0;
            }

            .demande p {
                font-size: 12px;
                margin-bottom: 6px;
                line-height: 1.3;
            }

            .demande p:last-of-type {
                -webkit-line-clamp: 2;
            }

            .prix {
                font-size: 14px;
                margin-bottom: 6px;
            }

            .btn-appel,
            .btn-whatsapp,
            .btn-delete {
                padding: 9px;
                border-radius: 10px;
                font-size: 11px;
                margin-top: 6px;
            }

            .badge-nouveau {
                font-size: 10px;
                padding: 5px 8px;
                margin-bottom: 6px;
            }

            .menu-filtres {
                width: 280px;
                max-width: calc(100vw - 40px);
                min-width: 260px;
                box-sizing: border-box;
                padding: 14px;
            }
        }
    </style>
</head>

<body>

<div class="top-left-menu">
    <button class="menu-btn" onclick="toggleAboutMenu()">☰</button>
    <div class="about-menu" id="aboutMenu">
        <h3>À propos</h3>
        <a href="mailto:atchougou6@gmail.com?subject=Contact%20Marketplace%20Gabonaise">Me contacter par mail</a>
        <a href="https://wa.me/241074552389?text=Bonjour,%20je%20veux%20signaler%20un%20bug%20sur%20la%20Marketplace%20Gabonaise." target="_blank">Signaler un bug</a>
    </div>
</div>

<div class="page-container">

    <section class="hero">
        <h1>Produits recherchés</h1>

        <p id="compteurDemandes"></p>

        <div class="main-cta">
            <button onclick="window.location.href='recherche.html'">+ Je cherche un produit</button>
        </div>

        <div class="secondary-actions">
            <button onclick="window.location.href='index.html'">Voir les annonces</button>
            <button onclick="window.location.href='index.html'">Retour à l’accueil</button>
        </div>

        <div class="utility-actions">
            <div class="filtres-row">
                <div class="filtres-zone">
                    <button class="btn-tri" onclick="toggleFiltres()">Filtres</button>

                    <div id="menuFiltres" class="menu-filtres">
                        <button class="btn-tri" onclick="trierPrixCroissant(); fermerFiltres()">Prix croissant</button>
                        <button class="btn-tri" onclick="trierPrixDecroissant(); fermerFiltres()">Prix décroissant</button>
                        <button class="btn-tri" onclick="reinitialiserTri(); fermerFiltres()">Réinitialiser tri</button>

                        <select id="filtreProvince" onchange="filtrerParProvince(); fermerFiltres()">
                            <option value="">Toutes les provinces</option>
                            <option value="Estuaire">Estuaire</option>
                            <option value="Haut-Ogooué">Haut-Ogooué</option>
                            <option value="Moyen-Ogooué">Moyen-Ogooué</option>
                            <option value="Ngounié">Ngounié</option>
                            <option value="Nyanga">Nyanga</option>
                            <option value="Ogooué-Ivindo">Ogooué-Ivindo</option>
                            <option value="Ogooué-Lolo">Ogooué-Lolo</option>
                            <option value="Ogooué-Maritime">Ogooué-Maritime</option>
                            <option value="Woleu-Ntem">Woleu-Ntem</option>
                        </select>

                        <button class="btn-tri" onclick="reinitialiserProvince(); fermerFiltres()">Réinitialiser province</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="demandes"></div>

</div>

<script>
let ordreTri = "aucun";
let provinceSelectionnee = "";

function toggleAboutMenu() {
    let menu = document.getElementById("aboutMenu");
    if (menu.dataset.open === "true") {
        menu.style.display = "none";
        menu.dataset.open = "false";
    } else {
        menu.style.display = "block";
        menu.dataset.open = "true";
    }
}

function afficherDemandes() {
    let demandesStockees = JSON.parse(localStorage.getItem("recherches")) || [];
    let container = document.getElementById("demandes");
    let compteur = document.getElementById("compteurDemandes");

    let demandesFiltrees = [...demandesStockees];

    if (ordreTri === "croissant") {
        demandesFiltrees.sort(function(a, b) {
            let budgetA = parseFloat((a.budget || "0").replace(/,/g, "").replace(/\s/g, "")) || 0;
            let budgetB = parseFloat((b.budget || "0").replace(/,/g, "").replace(/\s/g, "")) || 0;
            return budgetA - budgetB;
        });
    }

    if (ordreTri === "decroissant") {
        demandesFiltrees.sort(function(a, b) {
            let budgetA = parseFloat((a.budget || "0").replace(/,/g, "").replace(/\s/g, "")) || 0;
            let budgetB = parseFloat((b.budget || "0").replace(/,/g, "").replace(/\s/g, "")) || 0;
            return budgetB - budgetA;
        });
    }

    container.innerHTML = "";
    let resultatsTrouves = 0;

    for (let i = 0; i < demandesFiltrees.length; i++) {
        let provinceDemande = demandesFiltrees[i].province || "";

        if (provinceSelectionnee === "" || provinceDemande === provinceSelectionnee) {
            resultatsTrouves++;

            let demande = document.createElement("div");
            demande.classList.add("demande");

            let vraiIndex = demandesStockees.indexOf(demandesFiltrees[i]);
            let numero = (demandesFiltrees[i].telephone || "").replace(/\s/g, "").replace("+", "");
            let badgeNouveau = "";

            if (demandesFiltrees[i].datePublication && (Date.now() - demandesFiltrees[i].datePublication < 86400000)) {
                badgeNouveau = "<span class='badge-nouveau'>Nouveau</span>";
            }

            let boutonAppel = `
                <a href="tel:${numero}" onclick="event.stopPropagation()">
                    <button class="btn-appel">Appeler</button>
                </a>
            `;

            let boutonWhatsApp = `
                <a href="https://wa.me/${numero}" target="_blank" onclick="event.stopPropagation()">
                    <button class="btn-whatsapp">WhatsApp</button>
                </a>
            `;

            demande.innerHTML =
                (demandesFiltrees[i].images && demandesFiltrees[i].images.length > 0
                    ? "<img src='" + demandesFiltrees[i].images[0] + "'>"
                    : (demandesFiltrees[i].image ? "<img src='" + demandesFiltrees[i].image + "'>" : "")) +
                badgeNouveau +
                "<h3>" + demandesFiltrees[i].produit + "</h3>" +
                "<p class='prix'>" + (demandesFiltrees[i].budget ? demandesFiltrees[i].budget + " FCFA" : "Budget non précisé") + "</p>" +
                "<p>📞 " + demandesFiltrees[i].telephone + "</p>" +
                "<p><strong>Province :</strong> " + (demandesFiltrees[i].province || "Non précisée") + "</p>" +
                "<p>" + demandesFiltrees[i].description + "</p>" +
                "<div class='actions'>" +
                    boutonAppel +
                    boutonWhatsApp +
                    "<button class='btn-delete' onclick='event.stopPropagation(); supprimerDemande(" + vraiIndex + ")'>Supprimer</button>" +
                "</div>";

            demande.style.cursor = "pointer";
            demande.onclick = function() {
                localStorage.setItem("demandeSelectionnee", vraiIndex);
                window.location.href = "demande.html";
            };

            container.appendChild(demande);
        }
    }

    if (resultatsTrouves === 0) {
        compteur.textContent = "Aucun produit recherché trouvé";
        container.innerHTML = `
            <div class="empty-state">
                Aucun produit recherché pour l’instant 😢
            </div>
        `;
    } else if (resultatsTrouves === 1) {
        compteur.textContent = "1 produit recherché trouvé";
    } else {
        compteur.textContent = resultatsTrouves + " produits recherchés trouvés";
    }
}

function supprimerDemande(index) {
    let recherches = JSON.parse(localStorage.getItem("recherches")) || [];
    let demande = recherches[index];

    if (!demande) return;

    if (!demande.deleteCode) {
        alert("Cette demande n'a pas de code de suppression. Republie-la avec le nouveau système.");
        return;
    }

    let code = prompt("Entre le code de suppression de cette demande :");
    if (code === null) return;

    if (code.trim() !== demande.deleteCode) {
        alert("Code incorrect.");
        return;
    }

    recherches.splice(index, 1);
    localStorage.setItem("recherches", JSON.stringify(recherches));
    afficherDemandes();
}

function trierPrixCroissant() {
    ordreTri = "croissant";
    afficherDemandes();
}

function trierPrixDecroissant() {
    ordreTri = "decroissant";
    afficherDemandes();
}

function reinitialiserTri() {
    ordreTri = "aucun";
    afficherDemandes();
}

function toggleFiltres() {
    let menu = document.getElementById("menuFiltres");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function filtrerParProvince() {
    provinceSelectionnee = document.getElementById("filtreProvince").value;
    afficherDemandes();
    fermerFiltres();
}

function reinitialiserProvince() {
    provinceSelectionnee = "";
    document.getElementById("filtreProvince").value = "";
    afficherDemandes();
    fermerFiltres();
}

function fermerFiltres() {
    document.getElementById("menuFiltres").style.display = "none";
}

window.onclick = function(e) {
    let menu = document.getElementById("menuFiltres");
    let zone = document.querySelector(".filtres-zone");
    let aboutMenu = document.getElementById("aboutMenu");
    let topLeftMenu = document.querySelector(".top-left-menu");

    if (zone && !zone.contains(e.target)) {
        menu.style.display = "none";
    }

    if (topLeftMenu && !topLeftMenu.contains(e.target)) {
        aboutMenu.style.display = "none";
        aboutMenu.dataset.open = "false";
    }
};

window.onload = afficherDemandes;
</script>

</body>
</html>
