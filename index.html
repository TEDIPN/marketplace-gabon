<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linka</title>
<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.10), transparent 25%),
        linear-gradient(to bottom, #0b0b0f, #111117 45%, #0a0a0d);
    color: white;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    padding: 20px;
}

.page-container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
}

.top-left-menu {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 2000;
}

.menu-btn {
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.08);
    color: white;
    width: 46px;
    height: 46px;
    border-radius: 14px;
    font-size: 22px;
    cursor: pointer;
    backdrop-filter: blur(8px);
}

.about-menu {
    display: none;
    position: absolute;
    top: 56px;
    left: 0;
    width: 230px;
    background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    padding: 14px;
    box-shadow: 0 14px 30px rgba(0,0,0,0.45);
}

.about-menu h3 {
    margin: 0 0 10px 0;
    font-size: 15px;
    color: #f3f4f6;
}

.about-menu a,
.about-menu button {
    width: 100%;
    display: block;
    text-align: left;
    background: rgba(255,255,255,0.04);
    color: white;
    text-decoration: none;
    border: none;
    padding: 12px 14px;
    border-radius: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 14px;
}

.about-menu a:hover,
.about-menu button:hover {
    background: rgba(255,255,255,0.10);
}

.hero {
    background: linear-gradient(145deg, rgba(30,30,30,0.96), rgba(20,20,20,0.96));
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    margin-bottom: 24px;
}

.hero h1 {
    margin: 0 0 18px 0;
    text-align: center;
    font-size: 42px;
    line-height: 1.1;
    text-shadow: 0 4px 12px rgba(0,0,0,0.5);
}

.search-box {
    margin-bottom: 16px;
}

#rechercheAnnonce {
    width: 100%;
    padding: 16px 18px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.06);
    outline: none;
    background: rgba(255,255,255,0.06);
    color: white;
    font-size: 16px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    transition: 0.25s ease;
}

#rechercheAnnonce:focus {
    border-color: rgba(37, 99, 235, 0.7);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.16);
}

#compteurResultats {
    text-align: center;
    color: #b3b3b3;
    font-size: 17px;
    margin: 0 0 14px 0;
}

.suggestion-demande {
    width: 100%;
    margin: 0 0 16px 0;
    background: rgba(0,0,0,0.20);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 22px;
    padding: 22px;
    text-align: center;
}

.suggestion-demande h2 {
    margin: 0 0 10px 0;
    font-size: 24px;
}

.suggestion-demande p {
    margin: 0 0 14px 0;
    color: #d4d4d8;
    font-size: 15px;
    line-height: 1.45;
}

.suggestion-actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
}

.btn-big-orange {
    width: 100%;
    padding: 18px;
    border-radius: 18px;
    border: none;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #f97316, #ea580c);
    box-shadow: 0 10px 22px rgba(0,0,0,0.35);
}

.btn-big-orange:hover {
    transform: translateY(-2px);
}

.btn-home {
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
}

.main-ctas {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-bottom: 14px;
}

.btn-main-orange,
.btn-main-orange-small,
.btn-secondary,
.btn-tri,
.btn-whatsapp,
.btn-appel,
button {
    border: none;
    cursor: pointer;
    transition: 0.25s ease;
    font-weight: bold;
}

.btn-main-orange,
.btn-main-orange-small {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    font-size: 18px;
    color: white;
    background: linear-gradient(135deg, #f97316, #ea580c);
    box-shadow: 0 10px 22px rgba(0,0,0,0.35);
}

.btn-main-orange:hover,
.btn-main-orange-small:hover {
    transform: translateY(-2px);
}

.btn-main-orange-small {
    font-size: 17px;
}

.secondary-actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-bottom: 14px;
}

.btn-secondary {
    width: 100%;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    padding: 14px;
    border-radius: 14px;
    font-size: 15px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
}

.btn-secondary:hover {
    transform: translateY(-2px);
}

.btn-demandes {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.badge-count {
    min-width: 24px;
    height: 24px;
    padding: 0 8px;
    border-radius: 999px;
    background: #ef4444;
    color: white;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.utility-actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    align-items: start;
}

.filtres-row {
    display: flex;
    justify-content: flex-start;
}

.btn-tri {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    padding: 12px 16px;
    border-radius: 14px;
    color: white;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    font-size: 15px;
}

.btn-tri:hover {
    transform: translateY(-2px);
}

.filtres-zone {
    position: relative;
    display: inline-block;
}

.menu-filtres {
    display: none;
    position: absolute;
    top: 56px;
    left: 0;
    width: 260px;
    background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
    padding: 15px;
    border-radius: 16px;
    box-shadow: 0 14px 30px rgba(0,0,0,0.45);
    z-index: 1000;
    border: 1px solid rgba(255,255,255,0.05);
}

.menu-filtres button,
.menu-filtres select {
    width: 100%;
    margin-bottom: 10px;
}

.menu-filtres select {
    background-color: #151515;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 12px;
}

#annonces {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 22px;
    align-items: start;
}

.annonce {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
    padding: 15px;
    border-radius: 20px;
    width: 100%;
    box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    transition: 0.25s ease;
    overflow: hidden;
    min-height: 420px;
    border: 1px solid rgba(255,255,255,0.04);
}

.annonce:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 30px rgba(0,0,0,0.45);
}

.annonce img {
    width: 100%;
    height: 210px;
    object-fit: cover;
    border-radius: 16px;
    margin-bottom: 12px;
}

.annonce h3 {
    margin: 6px 0 10px 0;
    word-break: break-word;
    font-size: 24px;
    font-weight: bold;
    line-height: 1.2;
}

.annonce p {
    margin-bottom: 10px;
    word-break: break-word;
    color: #e5e5e5;
    line-height: 1.45;
}

.annonce p:last-of-type {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.prix {
    font-size: 20px;
    font-weight: bold;
    color: #22c55e !important;
    margin-bottom: 10px;
}

.actions {
    margin-top: auto;
}

.btn-whatsapp {
    background: linear-gradient(135deg, #25D366, #1ebe5d);
    padding: 12px;
    border-radius: 12px;
    color: white;
    width: 100%;
    margin-top: 10px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
}

.btn-whatsapp:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #1ebe5d, #17a74a);
}

.btn-appel {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    padding: 12px;
    border-radius: 12px;
    color: white;
    width: 100%;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
}

.btn-appel:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #d97706, #b45309);
}

.btn-delete {
    width: 100%;
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
    padding: 12px;
    border-radius: 12px;
    margin-top: 10px;
    font-size: 14px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
}

.btn-delete:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #dc2626, #b91c1c);
}

.btn-fav {
    background: rgba(255,255,255,0.05);
    font-size: 22px;
    margin-bottom: 6px;
    width: 56px;
    height: 56px;
    border-radius: 16px;
    box-shadow: none;
}

.btn-fav:hover {
    transform: scale(1.08);
}

.badge-nouveau {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    align-self: flex-start;
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
    font-size: 13px;
    font-weight: bold;
    padding: 8px 14px;
    border-radius: 999px;
    margin-bottom: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
}

.empty-state {
    width: 100%;
    text-align: center;
    color: #aaa;
    font-size: 18px;
    margin-top: 20px;
    background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
    border-radius: 20px;
    padding: 28px 20px;
    border: 1px solid rgba(255,255,255,0.04);
}

.mode-recherche-vide .main-ctas,
.mode-recherche-vide .secondary-actions,
.mode-recherche-vide .utility-actions,
.mode-recherche-vide #compteurResultats,
.mode-recherche-vide #annonces {
    display: none !important;
}

.mode-recherche-vide .hero {
    max-width: 720px;
    margin: 30px auto 0 auto;
}

@media (max-width: 768px) {
    body {
        padding: 14px;
    }

    .hero {
        padding: 18px;
    }

    .hero h1 {
        font-size: 30px;
        margin-top: 18px;
    }

    .menu-filtres {
        width: 280px;
        max-width: calc(100vw - 40px);
        min-width: 260px;
        box-sizing: border-box;
        padding: 14px;
    }

    #annonces {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
    }

    .annonce {
        min-height: auto;
        padding: 10px;
        border-radius: 16px;
    }

    .annonce img {
        height: 115px;
        border-radius: 12px;
        margin-bottom: 8px;
    }

    .annonce h3 {
        font-size: 15px;
        margin: 4px 0 6px 0;
    }

    .annonce p {
        font-size: 12px;
        margin-bottom: 6px;
        line-height: 1.3;
    }

    .annonce p:last-of-type {
        -webkit-line-clamp: 2;
    }

    .prix {
        font-size: 14px;
        margin-bottom: 6px;
    }

    .btn-fav {
        width: 34px;
        height: 34px;
        font-size: 15px;
        border-radius: 10px;
        margin-bottom: 4px;
    }

    .btn-appel,
    .btn-whatsapp,
    .btn-delete {
        padding: 9px;
        border-radius: 10px;
        font-size: 11px;
        margin-top: 6px;
    }

    .badge-nouveau {
        font-size: 10px;
        padding: 5px 8px;
        margin-bottom: 6px;
    }

    .suggestion-demande {
        padding: 18px 14px;
    }

    .suggestion-demande h2 {
        font-size: 20px;
    }

    .btn-big-orange {
        font-size: 17px;
        padding: 16px;
    }
}
</style>
</head>
<body>

<div class="top-left-menu">
    <button class="menu-btn" onclick="toggleAboutMenu()">☰</button>
    <div class="about-menu" id="aboutMenu">
        <h3>À propos</h3>
        <a href="mailto:atchougou6@gmail.com?subject=Contact%20Linka">Me contacter par mail</a>
        <a href="https://wa.me/241074552389?text=Bonjour,%20je%20veux%20signaler%20un%20bug%20sur%20Linka." target="_blank">Signaler un bug</a>
    </div>
</div>

<div class="page-container">
    <section class="hero">
        <h1>Linka</h1>

        <div class="search-box">
            <input
                type="text"
                id="rechercheAnnonce"
                placeholder="Rechercher une annonce..."
                oninput="afficherAnnonces()">
        </div>

        <p id="compteurResultats"></p>

        <div id="suggestionRecherche"></div>

        <div class="main-ctas">
            <button class="btn-main-orange" onclick="window.location.href='post.html'">+ Je vends un produit</button>
            <button class="btn-main-orange-small" onclick="window.location.href='recherche.html'">+ Je cherche un produit</button>
        </div>

        <div class="secondary-actions">
            <button class="btn-secondary btn-demandes" onclick="window.location.href='demandes.html'">
                Produits recherchés
                <span class="badge-count" id="badgeDemandes">0</span>
            </button>
        </div>

        <div class="utility-actions">
            <div class="filtres-row">
                <div class="filtres-zone">
                    <button class="btn-tri" onclick="toggleFiltres()">Filtres</button>

                    <div id="menuFiltres" class="menu-filtres">
                        <button class="btn-tri" onclick="trierPrixCroissant(); fermerFiltres()">Prix croissant</button>
                        <button class="btn-tri" onclick="trierPrixDecroissant(); fermerFiltres()">Prix décroissant</button>
                        <button class="btn-tri" onclick="reinitialiserTri(); fermerFiltres()">Réinitialiser tri</button>
                        <button class="btn-tri" onclick="filtrerFavoris(); fermerFiltres()">Afficher les favoris</button>
                        <button class="btn-tri" onclick="reinitialiserFavoris(); fermerFiltres()">Réinitialiser favoris</button>

                        <select id="filtreProvince" onchange="filtrerParProvince(); fermerFiltres()">
                            <option value="">Toutes les provinces</option>
                            <option value="Estuaire">Estuaire</option>
                            <option value="Haut-Ogooué">Haut-Ogooué</option>
                            <option value="Moyen-Ogooué">Moyen-Ogooué</option>
                            <option value="Ngounié">Ngounié</option>
                            <option value="Nyanga">Nyanga</option>
                            <option value="Ogooué-Ivindo">Ogooué-Ivindo</option>
                            <option value="Ogooué-Lolo">Ogooué-Lolo</option>
                            <option value="Ogooué-Maritime">Ogooué-Maritime</option>
                            <option value="Woleu-Ntem">Woleu-Ntem</option>
                        </select>

                        <button class="btn-tri" onclick="reinitialiserProvince(); fermerFiltres()">Réinitialiser province</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="annonces"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.0/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/12.2.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCHIqR65GqQBdM0vxPAaX-0ZB_qtF52968",
    authDomain: "linka-market.firebaseapp.com",
    projectId: "linka-market",
    storageBucket: "linka-market.firebasestorage.app",
    messagingSenderId: "871011074342",
    appId: "1:871011074342:web:d55d7240796f10d20c01e7",
    measurementId: "G-K1WTW2CB47"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let ordreTri = "aucun";
let provinceSelectionnee = "";
let afficherSeulementFavoris = false;
let annoncesFirestore = [];

function getAnnonceKey(annonce, index) {
    return annonce.id ? annonce.id : "legacy-annonce-" + index;
}

function mettreAJourBadgeDemandes() {
    let demandes = JSON.parse(localStorage.getItem("recherches")) || [];
    document.getElementById("badgeDemandes").textContent = demandes.length;
}

function toggleAboutMenu() {
    let menu = document.getElementById("aboutMenu");

    if (menu.dataset.open === "true") {
        menu.style.display = "none";
        menu.dataset.open = "false";
    } else {
        menu.style.display = "block";
        menu.dataset.open = "true";
    }
}

async function chargerAnnoncesDepuisFirebase() {
    try {
        const querySnapshot = await getDocs(collection(db, "annonces"));
        annoncesFirestore = [];

        querySnapshot.forEach((docSnap) => {
            annoncesFirestore.push({
                id: docSnap.id,
                ...docSnap.data()
            });
        });

        localStorage.setItem("annonces", JSON.stringify(annoncesFirestore));
    } catch (error) {
        console.error("Erreur chargement annonces :", error);
        annoncesFirestore = JSON.parse(localStorage.getItem("annonces")) || [];
    }
}

function afficherAnnonces() {
    let annoncesStockees = [...annoncesFirestore];
    let container = document.getElementById("annonces");
    let suggestionZone = document.getElementById("suggestionRecherche");
    let inputRecherche = document.getElementById("rechercheAnnonce");
    let recherche = "";
    let compteur = document.getElementById("compteurResultats");

    if (inputRecherche) {
        recherche = inputRecherche.value.toLowerCase().trim();
    }

    if (ordreTri === "croissant") {
        annoncesStockees.sort(function(a, b) {
            let prixA = parseFloat((a.prix || "").replace(/,/g, "").replace(/\s/g, "")) || 0;
            let prixB = parseFloat((b.prix || "").replace(/,/g, "").replace(/\s/g, "")) || 0;
            return prixA - prixB;
        });
    }

    if (ordreTri === "decroissant") {
        annoncesStockees.sort(function(a, b) {
            let prixA = parseFloat((a.prix || "").replace(/,/g, "").replace(/\s/g, "")) || 0;
            let prixB = parseFloat((b.prix || "").replace(/,/g, "").replace(/\s/g, "")) || 0;
            return prixB - prixA;
        });
    }

    container.innerHTML = "";
    suggestionZone.innerHTML = "";
    document.body.classList.remove("mode-recherche-vide");
    let resultatsTrouves = 0;

    for (let i = 0; i < annoncesStockees.length; i++) {
        let annonceItem = annoncesStockees[i];
        let titre = (annonceItem.titre || "").toLowerCase();
        let description = (annonceItem.description || "").toLowerCase();
        let provinceAnnonce = annonceItem.province || "";
        let favori = estFavori(annonceItem, i);

        if (
            (titre.includes(recherche) || description.includes(recherche) || recherche === "") &&
            (provinceSelectionnee === "" || provinceAnnonce === provinceSelectionnee) &&
            (!afficherSeulementFavoris || favori)
        ) {
            resultatsTrouves++;

            let annonce = document.createElement("div");
            annonce.classList.add("annonce");

            let imageHTML = "";
            if (annonceItem.images && annonceItem.images.length > 0) {
                imageHTML = "<img src='" + annonceItem.images[0] + "'>";
            } else if (annonceItem.image) {
                imageHTML = "<img src='" + annonceItem.image + "'>";
            }

            let numero = (annonceItem.telephone || "").replace(/\s/g, "").replace("+", "");
            let badgeNouveau = "";

            if (annonceItem.datePublication && (Date.now() - annonceItem.datePublication < 86400000)) {
                badgeNouveau = "<span class='badge-nouveau'>Nouveau</span>";
            }

            let boutonAppel = `
                <a href="tel:${numero}" onclick="event.stopPropagation()">
                    <button class="btn-appel">Appeler</button>
                </a>
            `;

            let boutonWhatsApp = `
                <a href="https://wa.me/${numero}" target="_blank" onclick="event.stopPropagation()">
                    <button class="btn-whatsapp">WhatsApp</button>
                </a>
            `;

            annonce.innerHTML =
                imageHTML +
                badgeNouveau +
                "<h3>" + (annonceItem.titre || "") + "</h3>" +
                "<p class='prix'>" + (annonceItem.prix || "") + " FCFA</p>" +
                "<p>📞 " + (annonceItem.telephone || "") + "</p>" +
                "<p><strong>Province :</strong> " + (annonceItem.province || "Non précisée") + "</p>" +
                "<p>" + (annonceItem.description || "") + "</p>" +
                "<div class='actions'>" +
                    "<button class='btn-fav' onclick='event.stopPropagation(); toggleFavori(" + i + ")'>" +
                        (estFavori(annonceItem, i) ? "❤️" : "🤍") +
                    "</button>" +
                    boutonAppel +
                    boutonWhatsApp +
                    "<button class='btn-delete' onclick='event.stopPropagation(); supprimerAnnonce(" + i + ")'>Supprimer</button>" +
                "</div>";

            annonce.style.cursor = "pointer";
            annonce.onclick = function() {
                localStorage.setItem("produitSelectionne", i);
                localStorage.setItem("annonces", JSON.stringify(annoncesStockees));
                window.location.href = "produit.html";
            };

            container.appendChild(annonce);
        }
    }

    if (resultatsTrouves === 0) {
        compteur.textContent = "";

        if (recherche !== "") {
            document.body.classList.add("mode-recherche-vide");
            suggestionZone.innerHTML = `
                <div class="suggestion-demande">
                    <h2>Aucun résultat</h2>
                    <p>Tu ne trouves pas <strong>"${recherche}"</strong> ?</p>
                    <div class="suggestion-actions">
                        <button class="btn-big-orange" onclick="allerVersDemande('${recherche.replace(/'/g, "\\'")}')">
                            Je cherche "${recherche}"
                        </button>
                        <button class="btn-home" onclick="retourAccueil()">Retour à l'accueil</button>
                    </div>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="empty-state">
                    Aucune annonce disponible pour le moment 😢
                </div>
            `;
        }
    } else if (resultatsTrouves === 1) {
        compteur.textContent = "1 annonce trouvée";
    } else {
        compteur.textContent = resultatsTrouves + " annonces trouvées";
    }
}

function retourAccueil() {
    document.getElementById("rechercheAnnonce").value = "";
    afficherAnnonces();
    window.scrollTo({ top: 0, behavior: "smooth" });
}

function allerVersDemande(texte) {
    localStorage.setItem("produitRechercheSuggestion", texte);
    window.location.href = "recherche.html";
}

async function supprimerAnnonce(index) {
    let annonce = annoncesFirestore[index];
    if (!annonce) return;

    if (!annonce.deleteCode) {
        alert("Cette annonce n'a pas encore de code de suppression.");
        return;
    }

    let code = prompt("Entre le code de suppression de cette annonce :");
    if (code === null) return;

    if (code.trim() !== String(annonce.deleteCode).trim()) {
        alert("Code incorrect.");
        return;
    }

    try {
        await deleteDoc(doc(db, "annonces", annonce.id));

        let favoris = JSON.parse(localStorage.getItem("favoris")) || [];
        let cle = getAnnonceKey(annonce, index);
        favoris = favoris.filter(function(item) {
            return item !== cle;
        });
        localStorage.setItem("favoris", JSON.stringify(favoris));

        await chargerAnnoncesDepuisFirebase();
        afficherAnnonces();
        alert("Annonce supprimée avec succès.");
    } catch (error) {
        console.error("Erreur suppression :", error);
        alert("Erreur lors de la suppression.");
    }
}

function trierPrixCroissant() {
    ordreTri = "croissant";
    afficherAnnonces();
}

function trierPrixDecroissant() {
    ordreTri = "decroissant";
    afficherAnnonces();
}

function reinitialiserTri() {
    ordreTri = "aucun";
    afficherAnnonces();
}

function toggleFiltres() {
    let menu = document.getElementById("menuFiltres");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function filtrerParProvince() {
    provinceSelectionnee = document.getElementById("filtreProvince").value;
    afficherAnnonces();
    fermerFiltres();
}

function reinitialiserProvince() {
    provinceSelectionnee = "";
    document.getElementById("filtreProvince").value = "";
    afficherAnnonces();
    fermerFiltres();
}

function fermerFiltres() {
    document.getElementById("menuFiltres").style.display = "none";
}

function toggleFavori(index) {
    let annonce = annoncesFirestore[index];
    if (!annonce) return;

    let favoris = JSON.parse(localStorage.getItem("favoris")) || [];
    let cle = getAnnonceKey(annonce, index);

    if (favoris.includes(cle)) {
        favoris = favoris.filter(function(item) {
            return item !== cle;
        });
    } else {
        favoris.push(cle);
    }

    localStorage.setItem("favoris", JSON.stringify(favoris));
    afficherAnnonces();
}

function estFavori(annonce, index) {
    let favoris = JSON.parse(localStorage.getItem("favoris")) || [];
    let cle = getAnnonceKey(annonce, index);
    return favoris.includes(cle);
}

function filtrerFavoris() {
    afficherSeulementFavoris = true;
    afficherAnnonces();
}

function reinitialiserFavoris() {
    afficherSeulementFavoris = false;
    afficherAnnonces();
}

window.toggleAboutMenu = toggleAboutMenu;
window.toggleFiltres = toggleFiltres;
window.trierPrixCroissant = trierPrixCroissant;
window.trierPrixDecroissant = trierPrixDecroissant;
window.reinitialiserTri = reinitialiserTri;
window.filtrerParProvince = filtrerParProvince;
window.reinitialiserProvince = reinitialiserProvince;
window.fermerFiltres = fermerFiltres;
window.filtrerFavoris = filtrerFavoris;
window.reinitialiserFavoris = reinitialiserFavoris;
window.retourAccueil = retourAccueil;
window.allerVersDemande = allerVersDemande;
window.toggleFavori = toggleFavori;
window.supprimerAnnonce = supprimerAnnonce;
window.afficherAnnonces = afficherAnnonces;

window.onclick = function(e) {
    let menu = document.getElementById("menuFiltres");
    let zone = document.querySelector(".filtres-zone");
    let aboutMenu = document.getElementById("aboutMenu");
    let topLeftMenu = document.querySelector(".top-left-menu");

    if (zone && !zone.contains(e.target)) {
        menu.style.display = "none";
    }

    if (topLeftMenu && !topLeftMenu.contains(e.target)) {
        aboutMenu.style.display = "none";
        aboutMenu.dataset.open = "false";
    }
};

window.onload = async function() {
    mettreAJourBadgeDemandes();
    await chargerAnnoncesDepuisFirebase();
    afficherAnnonces();
};
</script>

</body>
</html>
