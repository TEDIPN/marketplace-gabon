<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Je recherche</title>
    <style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        background:
            radial-gradient(circle at top, rgba(37, 99, 235, 0.10), transparent 25%),
            linear-gradient(to bottom, #0b0b0f, #111117 45%, #0a0a0d);
        color: white;
        font-family: Arial, sans-serif;
        min-height: 100vh;
        padding: 20px;
    }

    .page-container {
        max-width: 760px;
        margin: 0 auto;
    }

    .form-container {
        background: linear-gradient(145deg, rgba(30,30,30,0.96), rgba(20,20,20,0.96));
        border: 1px solid rgba(255,255,255,0.05);
        padding: 24px;
        border-radius: 24px;
        box-shadow: 0 14px 34px rgba(0,0,0,0.38);
    }

    .hero {
        margin-bottom: 24px;
        text-align: center;
    }

    .hero h2 {
        margin: 0 0 10px 0;
        font-size: 38px;
        line-height: 1.1;
        text-shadow: 0 4px 10px rgba(0,0,0,0.35);
    }

    .hero p {
        margin: 0;
        color: #b3b3b3;
        font-size: 16px;
        line-height: 1.5;
    }

    .form-section {
        background: rgba(255,255,255,0.035);
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 18px;
        padding: 18px;
        margin-bottom: 18px;
    }

    .section-title {
        font-size: 15px;
        color: #d0d0d0;
        font-weight: bold;
        margin-bottom: 16px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-size: 16px;
        font-weight: bold;
        color: #f3f4f6;
    }

    input,
    textarea,
    select {
        width: 100%;
        margin-top: 8px;
        margin-bottom: 18px;
        padding: 14px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.06);
        outline: none;
        font-size: 15px;
        box-sizing: border-box;
        background-color: #f3f4f6;
        color: #111827;
        transition: 0.2s ease;
    }

    input:focus,
    textarea:focus,
    select:focus {
        transform: scale(1.01);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.30);
    }

    textarea {
        resize: vertical;
        min-height: 140px;
    }

    .inline-group {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
    }

    .inline-group span {
        color: #d4d4d8;
        font-weight: bold;
        font-size: 14px;
    }

    .phone-group {
        display: grid;
        grid-template-columns: 170px 1fr;
        gap: 10px;
        align-items: start;
    }

    .upload-box {
        background: rgba(255,255,255,0.03);
        border: 1px dashed rgba(255,255,255,0.12);
        border-radius: 16px;
        padding: 16px;
    }

    .upload-text {
        color: #b7b7b7;
        font-size: 14px;
        margin-bottom: 12px;
        line-height: 1.5;
    }

    #preview {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 10px;
        margin-bottom: 16px;
    }

    #preview img {
        width: 110px;
        height: 110px;
        object-fit: cover;
        border-radius: 14px;
        box-shadow: 0 6px 14px rgba(0,0,0,0.35);
        border: 2px solid rgba(255,255,255,0.08);
    }

    .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 10px;
    }

    button {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        border: none;
        padding: 15px;
        border-radius: 16px;
        cursor: pointer;
        width: 100%;
        font-size: 15px;
        font-weight: bold;
        transition: 0.25s ease;
        box-shadow: 0 6px 16px rgba(0,0,0,0.30);
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 22px rgba(0,0,0,0.40);
    }

    #supprimerImage {
        background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    #supprimerImage:hover {
        background: linear-gradient(135deg, #dc2626, #b91c1c);
    }

    .btn-publier {
        background: linear-gradient(135deg, #f97316, #ea580c);
    }

    .btn-publier:hover {
        background: linear-gradient(135deg, #ea580c, #c2410c);
    }

    .bottom-link {
        text-align: center;
        margin-top: 18px;
    }

    .bottom-link a {
        color: #60a5fa;
        text-decoration: none;
        font-weight: bold;
    }

    .bottom-link a:hover {
        text-decoration: underline;
    }

    @media (max-width: 768px) {
        body {
            padding: 14px;
        }

        .form-container {
            padding: 18px;
            border-radius: 20px;
        }

        .hero h2 {
            font-size: 30px;
        }

        .hero p {
            font-size: 15px;
        }

        .section-title {
            font-size: 14px;
        }

        label {
            font-size: 15px;
        }

        .phone-group {
            grid-template-columns: 1fr;
        }

        .inline-group {
            grid-template-columns: 1fr;
        }

        .actions {
            grid-template-columns: 1fr;
        }

        #preview img {
            width: 90px;
            height: 90px;
        }

        input,
        textarea,
        select,
        button {
            font-size: 14px;
        }
    }
    </style>
</head>

<body>

<div class="page-container">
    <div class="form-container">

        <div class="hero">
            <h2>Je recherche un produit</h2>
            <p>Décris ce que tu cherches pour que les vendeurs puissent te contacter rapidement.</p>
        </div>

        <form>

            <div class="form-section">
                <div class="section-title">Produit recherché</div>

                <label>Produit</label>
                <input type="text" id="produit" placeholder="Ex: iPhone 13 Pro 256 Go">

                <label>Budget (optionnel)</label>
                <div class="inline-group">
                    <input type="text" id="budget" placeholder="Ex: 250,000">
                    <span>FCFA</span>
                </div>

                <label>Province</label>
                <select id="province">
                    <option value="">Choisir une province</option>
                    <option value="Estuaire">Estuaire</option>
                    <option value="Haut-Ogooué">Haut-Ogooué</option>
                    <option value="Moyen-Ogooué">Moyen-Ogooué</option>
                    <option value="Ngounié">Ngounié</option>
                    <option value="Nyanga">Nyanga</option>
                    <option value="Ogooué-Ivindo">Ogooué-Ivindo</option>
                    <option value="Ogooué-Lolo">Ogooué-Lolo</option>
                    <option value="Ogooué-Maritime">Ogooué-Maritime</option>
                    <option value="Woleu-Ntem">Woleu-Ntem</option>
                </select>
            </div>

            <div class="form-section">
                <div class="section-title">Contact acheteur</div>

                <label>Téléphone</label>
                <div class="phone-group">
                    <select id="indicatif">
                        <option value="+241">+241 (Gabon)</option>
                        <option value="+33">+33 (France)</option>
                        <option value="+27">+27 (Afrique du Sud)</option>
                        <option value="+237">+237 (Cameroun)</option>
                        <option value="+242">+242 (Congo)</option>
                    </select>

                    <input type="text" id="telephone" placeholder="Ex: 74123456">
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">Description</div>

                <label>Détails de la demande</label>
                <textarea id="description" placeholder="Décris le produit recherché, son état, la couleur, la capacité, etc."></textarea>
            </div>

            <div class="form-section">
                <div class="section-title">Images</div>

                <div class="upload-box">
                    <div class="upload-text">
                        Ajoute une ou plusieurs images de référence pour montrer exactement ce que tu recherches.
                    </div>

                    <input type="file" id="image" accept="image/*" multiple>
                    <div id="preview"></div>
                </div>
            </div>

            <div class="actions">
                <button type="button" id="supprimerImage" style="display:none;">Supprimer les images</button>
                <button type="button" class="btn-publier" onclick="publierRecherche()">Publier la demande</button>
            </div>

        </form>

        <div class="bottom-link">
            <a href="index.html">Retour à l’accueil</a>
        </div>

    </div>
</div>

<script>
document.getElementById("image").addEventListener("change", function(e) {
    let files = e.target.files;
    let preview = document.getElementById("preview");
    let boutonSupprimer = document.getElementById("supprimerImage");

    preview.innerHTML = "";

    if (files.length > 0) {
        boutonSupprimer.style.display = "block";

        for (let i = 0; i < files.length; i++) {
            let reader = new FileReader();

            reader.onload = function(event) {
                let img = document.createElement("img");
                img.src = event.target.result;
                preview.appendChild(img);
            };

            reader.readAsDataURL(files[i]);
        }
    }
});

document.getElementById("supprimerImage").addEventListener("click", function() {
    let imageInput = document.getElementById("image");
    let preview = document.getElementById("preview");
    let boutonSupprimer = document.getElementById("supprimerImage");

    imageInput.value = "";
    preview.innerHTML = "";
    boutonSupprimer.style.display = "none";
});

function publierRecherche() {
    let produit = document.getElementById("produit").value;
    let budget = document.getElementById("budget").value;
    let indicatif = document.getElementById("indicatif").value;
    let numero = document.getElementById("telephone").value;
    let telephone = indicatif + " " + numero;
    let province = document.getElementById("province").value;
    let description = document.getElementById("description").value;
    let imageInput = document.getElementById("image");

    if (produit === "" || numero === "" || province === "" || description === "") {
        alert("Remplis tous les champs obligatoires");
        return;
    }

    let fichiers = imageInput.files;
    let images = [];

    if (fichiers.length === 0) {
        sauvegarderRecherche(images);
        return;
    }

    let fichiersTraites = 0;

    for (let i = 0; i < fichiers.length; i++) {
        let reader = new FileReader();

        reader.onload = function(event) {
            images.push(event.target.result);
            fichiersTraites++;

            if (fichiersTraites === fichiers.length) {
                sauvegarderRecherche(images);
            }
        };

        reader.readAsDataURL(fichiers[i]);
    }

    function sauvegarderRecherche(images) {
        let recherche = {
            produit: produit,
            budget: budget,
            telephone: telephone,
            province: province,
            description: description,
            images: images,
            datePublication: Date.now()
        };

        let recherches = JSON.parse(localStorage.getItem("recherches")) || [];
        recherches.push(recherche);
        localStorage.setItem("recherches", JSON.stringify(recherches));

        alert("Demande publiée");
        window.location.href = "demandes.html";
    }
}
</script>

</body>
</html>
